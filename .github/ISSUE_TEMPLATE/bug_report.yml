name: "🐛 Bug report"
description: "Report something that is broken or behaves incorrectly"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve **Knitweb**. **Do not report security issues here** — see [SECURITY.md](../../SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal, deterministic steps or a snippet. The smaller, the faster we fix it.
      placeholder: |
        1. PYTHONPATH=src python3 -m pytest tests/property/test_x.py
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse --short HEAD` or the package version.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [core (crypto/canonical/CID), ledger, p2p, fabric, pouw, knitwebs, token, anchor, synaptic, edge, sdk, app/CLI, docs, other]
    validations:
      required: true
  - type: checkboxes
    id: invariants
    attributes:
      label: Confirmations
      options:
        - label: This is not a security vulnerability (those go through SECURITY.md).
          required: true
        - label: I searched existing issues for a duplicate.
          required: true
