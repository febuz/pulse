<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Pulse AR — live object observations</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #05070d; color: #e6f0ff;
    font: 14px/1.4 system-ui, sans-serif; overflow: hidden; }
  #stage { position: fixed; inset: 0; }
  video, canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  #overlay { pointer-events: none; }
  #hud { position: fixed; left: 12px; top: 12px; right: 12px; display: flex; gap: 8px;
    align-items: center; flex-wrap: wrap; z-index: 3; }
  #hud .pill { background: rgba(6,12,24,.72); border: 1px solid #1c2b45; border-radius: 999px;
    padding: 6px 12px; backdrop-filter: blur(6px); }
  #start { background: #2b6cff; border: 0; color: #fff; font-weight: 600; padding: 10px 18px;
    border-radius: 999px; cursor: pointer; }
  #count { color: #7fe0a6; font-variant-numeric: tabular-nums; }
  #err { color: #ff8a8a; }
  input { width: 21ch; background: rgba(6,12,24,.72); border: 1px solid #1c2b45; color: inherit;
    border-radius: 8px; padding: 6px 10px; }
</style>
</head>
<body>
<div id="stage">
  <video id="video" playsinline muted autoplay></video>
  <canvas id="overlay"></canvas>
</div>
<div id="hud">
  <button id="start">Start camera</button>
  <span class="pill">server <input id="server" value="" placeholder="(same origin)" /></span>
  <span class="pill">objects <span id="count">0</span></span>
  <span class="pill" id="device">device …</span>
  <span class="pill" id="err"></span>
</div>

<script>
const video = document.getElementById("video");
const overlay = document.getElementById("overlay");
const octx = overlay.getContext("2d");
const grab = document.createElement("canvas");
const gctx = grab.getContext("2d");
const $ = (id) => document.getElementById(id);

let running = false, inflight = false, latest = [], pose = null;
const FPS = 6, JPEG_Q = 0.6, MAX_W = 640;

function base() { return $("server").value.trim().replace(/\/+$/, ""); }

// Best-effort location so observations carry a real WHERE (geohash). Optional.
navigator.geolocation?.getCurrentPosition(
  (p) => { pose = { lat: p.coords.latitude, lon: p.coords.longitude, alt: p.coords.altitude || 0 }; },
  () => {}, { enableHighAccuracy: false, timeout: 4000 }
);

$("start").onclick = async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } }, audio: false,
    });
    video.srcObject = stream;
    await video.play();
    running = true;
    $("start").style.display = "none";
    fetch(base() + "/health").then(r => r.json())
      .then(h => $("device").textContent = "device " + (h.device || "").slice(0, 14) + "…")
      .catch(() => {});
    requestAnimationFrame(draw);
    setInterval(observe, 1000 / FPS);
  } catch (e) { $("err").textContent = "camera: " + e.message; }
};

async function observe() {
  if (!running || inflight || !video.videoWidth) return;
  inflight = true;
  try {
    const scale = Math.min(1, MAX_W / video.videoWidth);
    grab.width = Math.round(video.videoWidth * scale);
    grab.height = Math.round(video.videoHeight * scale);
    gctx.drawImage(video, 0, 0, grab.width, grab.height);
    const blob = await new Promise(r => grab.toBlob(r, "image/jpeg", JPEG_Q));
    let url = base() + "/observe";
    if (pose) url += `?lat=${pose.lat}&lon=${pose.lon}&alt=${pose.alt}`;
    const res = await fetch(url, { method: "POST", body: blob });
    const data = await res.json();
    if (data.error) { $("err").textContent = data.error; }
    else {
      $("err").textContent = "";
      // detections are in captured-frame pixels; remember that frame's size to scale.
      latest = (data.detections || []).map(d => ({ ...d, fw: grab.width, fh: grab.height }));
      $("count").textContent = latest.length;
    }
  } catch (e) { $("err").textContent = "net: " + e.message; }
  finally { inflight = false; }
}

function draw() {
  if (!running) return;
  overlay.width = overlay.clientWidth; overlay.height = overlay.clientHeight;
  octx.clearRect(0, 0, overlay.width, overlay.height);
  // map captured-frame coords → displayed (object-fit: cover) coords
  for (const d of latest) {
    const sx = overlay.width / d.fw, sy = overlay.height / d.fh;
    const s = Math.max(sx, sy);
    const ox = (overlay.width - d.fw * s) / 2, oy = (overlay.height - d.fh * s) / 2;
    const [x, y, w, h] = d.bbox;
    const X = x * s + ox, Y = y * s + oy, W = w * s, H = h * s;
    octx.lineWidth = 2; octx.strokeStyle = "#2be08a";
    octx.strokeRect(X, Y, W, H);
    const dims = d.dimensions_mm.some(v => v) ? ` · ${d.dimensions_mm.join("×")}mm` : "";
    const conf = (d.confidence_bps / 100).toFixed(0) + "%";
    const who = d.maker ? ` · maker ${d.maker.slice(0, 10)}…` : "";
    const label = `${d.what} ${conf}${dims}${who}`;
    octx.font = "600 14px system-ui, sans-serif";
    const tw = octx.measureText(label).width + 12;
    octx.fillStyle = "rgba(4,10,20,.82)";
    octx.fillRect(X, Y - 22, tw, 20);
    octx.fillStyle = "#c8ffe4";
    octx.fillText(label, X + 6, Y - 7);
  }
  requestAnimationFrame(draw);
}
</script>
</body>
</html>
